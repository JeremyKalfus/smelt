track: moonshot-enhanced-setting
experiment_name: m04_hinception_all12_diff_seed17
data_root: ${SMELT_DATA_ROOT}
output_root: results/runs
category_map_path: configs/exact-upstream/category_map.json
class_vocab_manifest_path: artifacts/manifests/base_class_vocab.json
exact_upstream_regression_path: artifacts/methods/m03_exact_upstream_regression_smoke.json
seed: 17
device: auto
epochs: 60
batch_size: 16
gradient_accumulation_steps: 4
lr: 0.002
weight_decay: 0.0005
grad_clip: 1.0
label_smoothing: 0.05
diff_period: 25
window_size: 100
stride: 50
num_workers: 0
validation_files_per_class: 1
locked_protocol: true
candidate_file_aggregators:
  - mean_logits
  - mean_probabilities
  - majority_vote
channel_set: all12
scheduler_name: cosine
scheduler_t_max: 60
scheduler_eta_min: 0.00005
shuffle_train_labels: false
model_name: hinception
model:
  stem_channels: 192
  branch_channels: 128
  bottleneck_channels: 128
  num_blocks: 8
  residual_interval: 3
  activation_name: gelu
  dropout: 0.2
  head_hidden_dim: 384
